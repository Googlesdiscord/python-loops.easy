<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Loop Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');

        :root {
            /* Light Theme Variables */
            --bg-app: #ffffff;
            --bg-sidebar: #f6f8fa;
            --bg-editor: #ffffff;
            --text-main: #1f2328;
            --text-muted: #636c76;
            --border: #d0d7de;
            --accent: #0969da;
            --accent-bg: #f1f8ff;
            --success: #1a7f37;
            --success-bg: #dafbe1;
            --token-var: #0550ae;
            --token-val: #116329;
            --console-bg: #f6f8fa;
        }

        [data-theme="dark"] {
            /* Dark Theme Variables */
            --bg-app: #0d1117;
            --bg-sidebar: #161b22;
            --bg-editor: #0d1117;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border: #30363d;
            --accent: #58a6ff;
            --accent-bg: rgba(56, 139, 253, 0.1);
            --success: #3fb950;
            --success-bg: rgba(63, 185, 80, 0.1);
            --token-var: #79c0ff;
            --token-val: #aff5b4;
            --console-bg: #010409;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .code-token {
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .variable-swap {
            color: var(--token-var);
            font-weight: bold;
        }

        .value-active {
            color: var(--token-val);
            transform: scale(1.05);
            text-shadow: 0 0 10px var(--accent-bg);
        }

        .line-highlight {
            background-color: var(--accent-bg);
            border-left: 3px solid var(--accent);
        }

        .sidebar {
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 var(--accent-bg); }
            70% { box-shadow: 0 0 0 8px transparent; }
            100% { box-shadow: 0 0 0 0 transparent; }
        }

        .status-dot {
            animation: pulse-green 2s infinite;
        }

        #loadingOverlay {
            background-color: #ffffff;
            z-index: 100;
        }
        [data-theme="dark"] #loadingOverlay { background-color: #0d1117; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Loading Screen -->
    <div id="loadingOverlay" class="fixed inset-0 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="spinner mb-4"></div>
        <div class="text-lg font-bold tracking-widest text-gray-500 animate-pulse">LOADING VISUALIZER</div>
    </div>

    <!-- Startup Popup -->
    <div id="startupPopup" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[110] px-4">
        <div class="bg-white dark:bg-[#161b22] border border-[#d0d7de] dark:border-[#30363d] rounded-xl p-8 max-w-sm w-full shadow-2xl text-center scale-90 transition-transform duration-300" id="popupContent">
            <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-4xl">😉</span>
            </div>
            <h2 class="text-2xl font-bold mb-2">Welcome!</h2>
            <p class="text-gray-500 dark:text-gray-400 mb-6">
                Created with ❤️ by <span class="text-blue-500 font-bold">Amarnath</span>
            </p>
            <button id="closeStartup" class="w-full bg-[#1f883d] hover:bg-[#1a7f37] text-white py-3 rounded-lg font-bold transition-colors">
                Let's Visualise
            </button>
        </div>
    </div>

    <!-- Syntax Error Modal -->
    <div id="errorModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[120] px-4">
        <div class="bg-white dark:bg-[#161b22] border border-red-500 rounded-xl p-6 max-w-md w-full shadow-2xl">
            <div class="flex items-center gap-3 text-red-500 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <h2 class="text-xl font-bold">Syntax Error</h2>
            </div>
            <p id="errorMessage" class="text-gray-600 dark:text-gray-400 mb-6 text-sm font-mono bg-gray-100 dark:bg-gray-800 p-3 rounded">
                Unexpected indentation...
            </p>
            <button id="closeError" class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg font-bold transition-colors">
                Fix Code
            </button>
        </div>
    </div>

    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-4 border-b border-[var(--border)] bg-[var(--bg-sidebar)]">
        <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-[var(--success)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.31"/><path d="M14 9.3V2"/><path d="m11.17 12 4.14-4.14"/><path d="m12.83 12-4.14-4.14"/><path d="M16 11V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v6"/><path d="M8 21h8"/><path d="M12 11v10"/></svg>
            <h1 class="text-xl font-bold tracking-tight">PyLoop<span class="text-[var(--accent)]">Visualizer</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <!-- Theme Toggle -->
            <button id="themeToggle" class="p-2 rounded-lg border border-[var(--border)] bg-[var(--bg-app)] hover:bg-[var(--bg-sidebar)] transition-all">

                <svg id="moonIcon" class="w-5 h-5 text-gray-500" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001
