<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Loop Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');

        :root {
            --bg-app: #ffffff;
            --bg-sidebar: #f6f8fa;
            --bg-editor: #ffffff;
            --text-main: #1f2328;
            --text-muted: #636c76;
            --border: #d0d7de;
            --accent: #0969da;
            --accent-bg: #f1f8ff;
            --success: #1a7f37;
            --success-bg: #dafbe1;
            --token-var: #0550ae;
            --token-val: #116329;
            --console-bg: #f6f8fa;
        }

        [data-theme="dark"] {
            --bg-app: #0d1117;
            --bg-sidebar: #161b22;
            --bg-editor: #0d1117;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border: #30363d;
            --accent: #58a6ff;
            --accent-bg: rgba(56, 139, 253, 0.1);
            --success: #3fb950;
            --success-bg: rgba(63, 185, 80, 0.1);
            --token-var: #79c0ff;
            --token-val: #aff5b4;
            --console-bg: #010409;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .variable-swap {
            color: var(--token-var);
            font-weight: bold;
            display: inline-block;
        }

        .value-active {
            color: var(--token-val);
            transform: scale(1.05);
            text-shadow: 0 0 10px var(--accent-bg);
            transition: all 0.2s ease;
        }

        .line-highlight {
            background-color: var(--accent-bg);
            border-left: 3px solid var(--accent);
        }

        .sidebar {
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        #loadingOverlay {
            background-color: var(--bg-app);
            z-index: 200;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #editorPane {
            border-right: 1px solid var(--border);
        }

        .code-line-wrapper {
            display: flex;
            align-items: flex-start;
            padding: 0.1rem 1rem;
        }

        .line-number {
            width: 2.5rem;
            text-align: right;
            padding-right: 1rem;
            color: var(--text-muted);
            user-select: none;
            font-size: 0.875rem;
        }

        .line-content {
            flex: 1;
            white-space: pre;
            word-break: break-all;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="loadingOverlay" class="fixed inset-0 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="spinner mb-4"></div>
        <div class="text-lg font-bold tracking-widest text-gray-500 animate-pulse uppercase">Initializing Environment...</div>
    </div>

    <div id="startupPopup" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[110] px-4">
        <div class="bg-white dark:bg-[#161b22] border border-[#d0d7de] dark:border-[#30363d] rounded-xl p-8 max-w-sm w-full shadow-2xl text-center scale-90 transition-transform duration-300" id="popupContent">
            <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-4xl">😉</span>
            </div>
            <h2 class="text-2xl font-bold mb-2">Welcome!</h2>
            <p class="text-gray-500 dark:text-gray-400 mb-6">
                Created with ❤️ by <span class="text-blue-500 font-bold">Amarnath</span>
            </p>
            <button id="closeStartup" class="w-full bg-[#1f883d] hover:bg-[#1a7f37] text-white py-3 rounded-lg font-bold transition-colors">
                Let's Visualise
            </button>
            <p class="text-[10px] text-gray-400 mt-4 uppercase tracking-widest font-medium opacity-80">
                Press any key to enter • Closing in <span id="startupTimer">5</span>s
            </p>
        </div>
    </div>

    <div id="errorModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[120] px-4">
        <div class="bg-white dark:bg-[#161b22] border border-red-500 rounded-xl p-6 max-w-md w-full shadow-2xl">
            <div class="flex items-center gap-3 text-red-500 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <h2 class="text-xl font-bold">Execution Error</h2>
            </div>
            <p id="errorMessage" class="text-gray-600 dark:text-gray-400 mb-6 text-sm font-mono bg-gray-100 dark:bg-gray-800 p-3 rounded break-words"></p>
            <button id="closeError" class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg font-bold transition-colors">Close</button>
        </div>
    </div>

    <header class="flex items-center justify-between px-6 py-4 border-b border-[var(--border)] bg-[var(--bg-sidebar)]">
        <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-[var(--success)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.31"/><path d="M14 9.3V2"/><path d="m11.17 12 4.14-4.14"/><path d="m12.83 12-4.14-4.14"/><path d="M16 11V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v6"/><path d="M8 21h8"/><path d="M12 11v10"/></svg>
            <h1 class="text-xl font-bold tracking-tight">PyLoop<span class="text-[var(--accent)]">Visualizer</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="themeToggle" class="p-2 rounded-lg border border-[var(--border)] bg-[var(--bg-app)] hover:bg-[var(--bg-sidebar)] transition-all">
                <svg id="sunIcon" class="hidden w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464l-.707-.707a1 1 0 00-1.414 1.414l.707.707a1 1 0 001.414-1.414zm2.12 10.607a1 1 0 010-1.414l.706-.707a1 1 0 111.414 1.414l-.707.707a1 1 0 01-1.414 0zM4 11a1 1 0 100-2H3a1 1 0 100 2h1z"/></svg>
                <svg id="moonIcon" class="w-5 h-5 text-gray-500" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
            </button>
            <div id="controls" class="flex gap-2">
                <button id="startBtn" class="bg-[#1f883d] hover:bg-[#1a7f37] text-white px-6 py-2 rounded-md font-medium transition-all flex items-center gap-2 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    <span id="startBtnText">Start</span>
                </button>
                <button id="resetBtn" class="hidden bg-[var(--bg-sidebar)] hover:bg-[var(--border)] text-[var(--text-main)] border border-[var(--border)] px-6 py-2 rounded-md font-medium transition-all flex items-center gap-2 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                    Reset
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <div id="editorPane" class="flex-1 flex flex-col">
            <div class="px-6 py-2 bg-[var(--bg-app)] text-xs font-semibold text-[var(--text-muted)] uppercase tracking-widest border-b border-[var(--border)]">
                main.py
            </div>
            <textarea id="codeInput" spellcheck="false" class="flex-1 w-full p-6 bg-[var(--bg-app)] text-[var(--text-main)] focus:outline-none resize-none text-lg custom-scrollbar" placeholder="Enter loop...">for i in range(1, 4):
    for j in range(1, 4):
        product = i * j
        print(f"{i} * {j} = {product}")
    
    print("--- End of Row ---")</textarea>
            <div class="p-4 bg-[var(--bg-sidebar)] text-sm text-[var(--text-muted)] border-t border-[var(--border)]">
                💡 Tip: Use <kbd class="px-2 py-0.5 bg-[var(--bg-app)] border border-[var(--border)] rounded text-xs">Tab</kbd> to indent. <kbd class="px-2 py-0.5 bg-[var(--bg-app)] border border-[var(--border)] rounded text-xs">Ctrl + Enter</kbd> to run.
            </div>
        </div>

        <div id="visualPane" class="hidden flex-1 flex flex-col bg-[var(--bg-app)] border-l border-[var(--border)]">
            <div class="px-6 py-2 bg-[var(--bg-app)] text-xs font-semibold text-[var(--text-muted)] uppercase tracking-widest border-b border-[var(--border)] flex justify-between items-center">
                <span>Execution Timeline</span>
                <span id="stepCounter" class="text-[var(--accent)]">Step 0 / 0</span>
            </div>
            <div id="codeDisplay" class="flex-1 py-4 text-lg leading-relaxed select-none overflow-auto custom-scrollbar">
            </div>
            <div class="p-6 bg-[var(--bg-sidebar)] border-t border-[var(--border)] flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="h-3 w-3 rounded-full bg-[var(--success)]"></div>
                    <span id="instruction" class="text-sm text-[var(--text-muted)] truncate max-w-[300px]">Press Spacebar...</span>
                </div>
                <button id="nextStepBtn" class="bg-[var(--bg-app)] hover:bg-[var(--bg-sidebar)] text-[var(--text-main)] border border-[var(--border)] px-4 py-2 rounded text-sm font-bold flex items-center gap-2 shadow-sm">
                    Step <span class="opacity-40 text-xs font-normal">SPACE</span>
                </button>
            </div>
        </div>

        <aside class="w-80 sidebar flex flex-col">
            <div class="p-4 border-b border-[var(--border)] flex items-center gap-2 bg-[var(--bg-sidebar)]">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--text-muted)]"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                <h2 class="font-bold text-sm uppercase tracking-wider text-[var(--text-muted)]">Console</h2>
            </div>
            <div id="consoleOutput" class="flex-1 p-4 bg-[var(--console-bg)] text-sm font-mono overflow-auto custom-scrollbar">
                <div class="text-gray-500 italic">No output yet.</div>
            </div>

            <div class="p-4 border-t border-[var(--border)] bg-[var(--bg-app)]">
                <h3 class="text-xs font-bold uppercase text-[var(--text-muted)] mb-2">Live Stack</h3>
                <div id="loopInfo" class="space-y-1"></div>
            </div>
        </aside>
    </main>

    <script>
        class Interpreter {
            constructor() {
                this.steps = [];
                this.lines = [];
                this.scope = {};
                this.console = [];
                this.maxIterations = 1000;
                this.iterationCount = 0;
            }

            parse(code) {
                this.steps = [];
                this.lines = code.split('\n').map(l => l.trimEnd());
                this.scope = {};
                this.console = [];
                this.iterationCount = 0;
                try {
                    this.runBlock(0, this.lines.length);
                    this.addStep(-1, "Program finished.");
                    return true;
                } catch (e) {
                    throw e;
                }
            }

            runBlock(start, end) {
                let current = start;
                while (current < end) {
                    if (this.iterationCount++ > this.maxIterations) throw new Error("Safety Break: Loop too complex or infinite.");
                    
                    const lineRaw = this.lines[current];
                    const lineTrim = lineRaw.trim();

                    if (!lineTrim || lineTrim.startsWith('#')) {
                        current++;
                        continue;
                    }

                    // 1. Loop detection
                    const forMatch = lineRaw.match(/^(\s*)for\s+(\w+)\s+in\s+(.+):/);
                    const whileMatch = lineRaw.match(/^(\s*)while\s+(.+):/);

                    if (forMatch) {
                        const [full, indent, varName, iterableExpr] = forMatch;
                        const collection = this.evaluate(iterableExpr);
                        const bodyRange = this.getIndentedBlock(current);
                        
                        for (const val of collection) {
                            this.scope[varName] = val;
                            const override = `${indent}for <span class="variable-swap value-active">${val}</span> in ${iterableExpr}:`;
                            this.addStep(current, `Setting ${varName} to ${val}`, override);
                            this.runBlock(bodyRange.start, bodyRange.end);
                        }
                        current = bodyRange.end;
                        continue;
                    }

                    if (whileMatch) {
                        const [full, indent, condExpr] = whileMatch;
                        const bodyRange = this.getIndentedBlock(current);
                        
                        while (true) {
                            const steps = this.getSubstitutionSteps(condExpr);
                            steps.forEach(s => this.addStep(current, "Checking condition", `${indent}while ${s}:`));
                            
                            if (this.evaluate(condExpr)) {
                                this.runBlock(bodyRange.start, bodyRange.end);
                            } else break;
                        }
                        current = bodyRange.end;
                        continue;
                    }

                    // 2. Assignment / Print
                    this.processSimpleLine(lineRaw, current);
                    current++;
                }
            }

            processSimpleLine(lineRaw, idx) {
                const indent = lineRaw.match(/^\s*/)[0];
                const line = lineRaw.trim();

                // Assignment
                const assignMatch = line.match(/^(\w+)\s*(\+|-|\*|\/|)?=\s*(.*)$/);
                if (assignMatch) {
                    const [f, varName, op, expr] = assignMatch;
                    const steps = this.getSubstitutionSteps(expr);
                    steps.forEach(s => this.addStep(idx, "Calculating expression", `${indent}${varName} ${op || ''}= ${s}`));
                    
                    const val = this.evaluate(expr);
                    if (!op) this.scope[varName] = val;
                    else {
                        const old = this.scope[varName] || 0;
                        if (op === '+') this.scope[varName] = old + val;
                        else if (op === '-') this.scope[varName] = old - val;
                        else if (op === '*') this.scope[varName] = old * val;
                    }
                    this.addStep(idx, `Updated ${varName}`, `${indent}${varName} = <span class="variable-swap value-active">${this.scope[varName]}</span>`);
                    return;
                }

                // Print
                const printMatch = line.match(/^print\((.*)\)$/);
                if (printMatch) {
                    const expr = printMatch[1];
                    const steps = this.getSubstitutionSteps(expr);
                    steps.forEach(s => this.addStep(idx, "Evaluating output", `${indent}print(${s})`));
                    
                    const val = this.evaluate(expr);
                    this.addStep(idx, "Preparing to print", `${indent}print(<span class="variable-swap value-active">${val}</span>)`);
                    this.console.push(String(val));
                    this.addStep(idx, `Printed: ${val}`);
                    return;
                }

                this.addStep(idx);
            }

            getIndentedBlock(lineIdx) {
                const baseIndent = this.lines[lineIdx].search(/\S/);
                let end = lineIdx + 1;
                while (end < this.lines.length) {
                    const line = this.lines[end];
                    if (line.trim() && line.search(/\S/) <= baseIndent) break;
                    end++;
                }
                return { start: lineIdx + 1, end };
            }

            evaluate(expr) {
                expr = expr.trim();
                // Range
                const rMatch = expr.match(/^range\((.*)\)$/);
                if (rMatch) {
                    const args = rMatch[1].split(',').map(a => this.evaluate(a));
                    if (args.length === 1) return Array.from({length: args[0]}, (_, i) => i);
                    if (args.length === 2) return Array.from({length: args[1] - args[0]}, (_, i) => i + args[0]);
                }
                // f-strings
                if (expr.startsWith('f"') || expr.startsWith("f'")) {
                    let template = expr.slice(2, -1);
                    return template.replace(/\{([^}]+)\}/g, (_, inner) => this.evaluate(inner));
                }
                // Literals/Strings
                if ((expr.startsWith('"') && expr.endsWith('"')) || (expr.startsWith("'") && expr.endsWith("'"))) {
                    return expr.slice(1, -1);
                }
                // Math / Vars
                try {
                    let proc = expr;
                    const keys = Object.keys(this.scope).sort((a,b) => b.length - a.length);
                    for (const k of keys) { proc = proc.replace(new RegExp(`\\b${k}\\b`, 'g'), this.scope[k]); }
                    return Function(`"use strict"; return (${proc})`)();
                } catch (e) { return expr; }
            }

            getSubstitutionSteps(expr) {
                const steps = [];
                const tokens = expr.split(/(\W+)/);
                const vars = tokens.map((t, i) => t.match(/^[a-zA-Z_]\w*$/) && this.scope.hasOwnProperty(t) ? i : -1).filter(i => i !== -1);
                
                for (let i = 0; i < vars.length; i++) {
                    const current = [...tokens];
                    for (let j = 0; j <= i; j++) {
                        const idx = vars[j];
                        current[idx] = `<span class="variable-swap value-active">${this.scope[tokens[idx]]}</span>`;
                    }
                    steps.push(current.join(''));
                }
                return steps;
            }

            addStep(lineIdx, message = "", override = null) {
                this.steps.push({
                    lineIndex: lineIdx,
                    vars: {...this.scope},
                    output: [...this.console],
                    message,
                    override
                });
            }
        }

        const engine = new Interpreter();
        let currentStep = 0;
        let running = false;

        const el = {
            html: document.documentElement,
            editor: document.getElementById('codeInput'),
            display: document.getElementById('codeDisplay'),
            console: document.getElementById('consoleOutput'),
            stack: document.getElementById('loopInfo'),
            counter: document.getElementById('stepCounter'),
            instr: document.getElementById('instruction'),
            visualPane: document.getElementById('visualPane'),
            startBtn: document.getElementById('startBtn'),
            startBtnText: document.getElementById('startBtnText'),
            resetBtn: document.getElementById('resetBtn'),
            nextBtn: document.getElementById('nextStepBtn'),
            themeBtn: document.getElementById('themeToggle'),
            sun: document.getElementById('sunIcon'),
            moon: document.getElementById('moonIcon'),
            errorModal: document.getElementById('errorModal'),
            errorMsg: document.getElementById('errorMessage')
        };

        function start() {
            try {
                engine.parse(el.editor.value);
                running = true;
                currentStep = 0;
                el.visualPane.classList.remove('hidden');
                el.resetBtn.classList.remove('hidden');
                el.startBtnText.textContent = "Restart";
                renderBaseCode();
                applyStep(0);
            } catch (e) {
                el.errorMsg.textContent = e.message;
                el.errorModal.classList.remove('hidden');
            }
        }

        function renderBaseCode() {
            el.display.innerHTML = engine.lines.map((line, i) => `
                <div class="code-line-wrapper" id="l-${i}">
                    <div class="line-number">${i + 1}</div>
                    <div class="line-content">${line}</div>
                </div>
            `).join('');
        }

        function applyStep(idx) {
            const step = engine.steps[idx];
            if (!step) return;

            document.querySelectorAll('.code-line-wrapper').forEach((div, i) => {
                div.classList.remove('line-highlight');
                div.querySelector('.line-content').innerHTML = engine.lines[i];
            });

            if (step.lineIndex !== -1) {
                const lineDiv = document.getElementById(`l-${step.lineIndex}`);
                if (lineDiv) {
                    lineDiv.classList.add('line-highlight');
                    lineDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    if (step.override) lineDiv.querySelector('.line-content').innerHTML = step.override;
                }
            }

            el.counter.textContent = `Step ${idx + 1} / ${engine.steps.length}`;
            el.instr.textContent = step.message || "Executing...";
            el.console.innerHTML = step.output.length ? step.output.map(o => `<div>> ${o}</div>`).join('') : '<div class="text-gray-500 italic">No output yet.</div>';
            el.console.scrollTop = el.console.scrollHeight;

            el.stack.innerHTML = Object.entries(step.vars).map(([k, v]) => `
                <div class="flex justify-between text-sm bg-[var(--bg-sidebar)] p-2 rounded border border-[var(--border)]">
                    <span class="font-bold text-[var(--token-var)]">${k}</span>
                    <span class="text-[var(--token-val)]">${JSON.stringify(v)}</span>
                </div>
            `).join('');
        }

        function next() {
            if (!running) return;
            if (currentStep < engine.steps.length - 1) applyStep(++currentStep);
            else el.instr.textContent = "Finished!";
        }

        el.startBtn.addEventListener('click', start);
        el.nextBtn.addEventListener('click', next);
        el.resetBtn.addEventListener('click', () => location.reload());
        el.themeBtn.addEventListener('click', () => {
            const dark = el.html.getAttribute('data-theme') === 'dark';
            el.html.setAttribute('data-theme', dark ? 'light' : 'dark');
            el.sun.classList.toggle('hidden');
            el.moon.classList.toggle('hidden');
        });
        document.getElementById('closeError').addEventListener('click', () => el.errorModal.classList.add('hidden'));

        el.editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                document.execCommand('insertText', false, '    ');
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') start();
        });

        window.addEventListener('keydown', e => { if (e.code === 'Space' && running) { e.preventDefault(); next(); } });

        // Auto-loading logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('opacity-0', 'hidden');
                const startup = document.getElementById('startupPopup');
                startup.classList.remove('hidden');
                let count = 5;
                const timer = setInterval(() => {
                    document.getElementById('startupTimer').textContent = --count;
                    if (count <= 0) { startup.classList.add('hidden'); clearInterval(timer); }
                }, 1000);
                const close = () => { startup.classList.add('hidden'); clearInterval(timer); window.removeEventListener('keydown', close); };
                document.getElementById('closeStartup').addEventListener('click', close);
                window.addEventListener('keydown', close);
            }, 800);
        });
    </script>
</body>
